<div class="min-h-screen bg-[#0f0f0f] flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <h1 class="font-serif text-4xl text-white tracking-tight mb-1">
      Master<span class="italic text-[#c8f04c]">mind</span>
    </h1>
    <p class="text-sm text-neutral-500 font-light mb-10">Entre para jogar</p>

    <form [formGroup]="form" (ngSubmit)="onLogin()">

      <app-form-field
        label="Usuário"
        placeholder="seu usuário"
        [control]="f['username']" />

      <app-form-field
        label="Senha"
        type="password"
        placeholder="••••••••"
        [control]="f['password']" />

      @if(errorMessage()){
        <p class="text-red-400 text-sm mb-4 text-center">
          {{ errorMessage() }}
        </p>
      }

      <button
        type="submit"
        [disabled]="loading()"
        [class.cursor-pointer]="form.valid && !loading()"
        [class.cursor-not-allowed]="form.invalid || loading()"
        class="w-full bg-[#c8f04c] text-[#0f0f0f] font-medium rounded-lg py-3 text-sm
               hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed">
        {{ loading() ? 'Entrando...' : 'Entrar' }}
      </button>

    </form>

    <p class="text-center text-sm text-neutral-600 mt-6">
      Não tem conta?
      <a routerLink="/register" class="text-[#c8f04c] hover:underline">Cadastre-se</a>
    </p>

  </div>
</div>
