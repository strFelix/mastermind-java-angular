<div class="min-h-screen bg-[#0f0f0f] flex items-center justify-center px-6 py-8 font-sans">
  <div class="w-full max-w-4xl">

    <app-header buttonLabel="Sair" (buttonClick)="logout()" />

    <!-- saudação -->
    <div class="mb-8">
      <p class="text-[11px] uppercase tracking-widest text-neutral-600 mb-1">Bem-vindo de volta</p>
      <h2 class="font-serif text-3xl text-white font-normal">
        {{ username }}<span class="italic text-[#c8f04c]"> :)</span>
      </h2>
    </div>

    <!-- stats -->
    <div class="grid grid-cols-2 gap-3 mb-8">
      <div class="bg-[#1a1a1a] border border-[#2a2a2a] rounded-xl p-4">
        <p class="text-[11px] uppercase tracking-widest text-neutral-600 mb-2">Melhor pontuação</p>
        <p class="text-2xl font-medium text-[#c8f04c]">{{ bestScore() }}</p>
      </div>
      <div class="bg-[#1a1a1a] border border-[#2a2a2a] rounded-xl p-4">
        <p class="text-[11px] uppercase tracking-widest text-neutral-600 mb-2">Partidas</p>
        <p class="text-2xl font-medium text-white">{{ history().length }}</p>
      </div>
    </div>

    <!-- ações -->
    <button (click)="startGame()" [disabled]="loading()" [class.cursor-pointer]="!loading()"
      [class.cursor-not-allowed]="loading()" class="w-full bg-[#c8f04c] text-[#0f0f0f] font-medium rounded-xl py-3.5 text-sm
             hover:opacity-90 transition-opacity disabled:opacity-50 mb-3">
      {{ loading() ? 'Iniciando...' : 'Novo jogo' }}
    </button>

    <button routerLink="/ranking" class="w-full bg-transparent text-neutral-600 border border-[#2a2a2a] rounded-xl py-3.5
             text-sm hover:text-[#c8f04c] hover:border-[#c8f04c]/20 transition-colors cursor-pointer mb-8">
      Ver ranking
    </button>

    <!-- histórico -->
    @if(history().length > 0) {
      <p class="text-[11px] uppercase tracking-widest text-neutral-700 mb-3">Últimas partidas</p>
      @for(game of history(); track game.id) {
        <app-history-row
          [startTime]="game.startTime"
          [attempts]="game.attempts"
          [score]="game.score"
          [won]="game.won" />
      }
    }

  </div>
</div>
