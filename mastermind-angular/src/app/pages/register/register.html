<div class="min-h-screen bg-[#0f0f0f] flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <h1 class="font-serif text-4xl text-white tracking-tight mb-1">
      Master<span class="italic text-[#c8f04c]">mind</span>
    </h1>
    <p class="text-sm text-neutral-500 font-light mb-10">Crie sua conta</p>

    <form [formGroup]="form" (ngSubmit)="onRegister()">

      <app-form-field
        label="Usuário"
        placeholder="seu usuário"
        [control]="f['username']"
        errorMessage="Usuário obrigatório" />

      <app-form-field
        label="E-mail"
        type="email"
        placeholder="seu@email.com"
        [control]="f['email']"
        errorMessage="E-mail inválido" />

      <app-form-field
        label="Senha"
        type="password"
        placeholder="••••••••"
        [control]="f['password']"
        errorMessage="Mínimo 6 caracteres" />

      @if(errorMessage()) {
        <p class="text-red-400 text-sm mb-4 text-center">{{ errorMessage() }}</p>
      }

      @if(successMessage()) {
        <p class="text-[#c8f04c] text-sm mb-4 text-center">{{ successMessage() }}</p>
      }

      <button
        type="submit"
        [disabled]="loading()"
        [class.cursor-pointer]="form.valid && !loading()"
        [class.cursor-not-allowed]="form.invalid || loading()"
        class="w-full bg-[#c8f04c] text-[#0f0f0f] font-medium rounded-lg py-3 text-sm
               hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed">
        {{ loading() ? 'Criando conta...' : 'Criar conta' }}
      </button>

    </form>

    <p class="text-center text-sm text-neutral-600 mt-6">
      Já tem conta?
      <a routerLink="/" class="text-[#c8f04c] hover:underline">Entrar</a>
    </p>

  </div>
</div>
